name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
permissions: { contents: read }
jobs:
  csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - run: dotnet build cs/src/Ahp.Core.Verified/Ahp.Core.Verified.csproj -c Release -warnaserror
      - run: dotnet run --project cs/test/Ahp.Core.Verified.SmokeTest -c Release
  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd js && npm ci --ignore-scripts || npm install --ignore-scripts
      - run: cd js && npm run build && npm test
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      # -p=1 -gcflags=-l: the extracted Chat reducer OOMs the inliner otherwise. See go/BUILDING.md
      - run: cd go && go build -p=1 -gcflags=-l ./... && go test -p=1 -gcflags=-l ./...
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: cd py && python -m pip install build && python -m build && python -m pip install dist/*.whl
      - run: cd /tmp && python -c "import agent_host_protocol as a; r=a.run_corpus(); print(r); assert all(p==t for p,t in r.values())"
  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      - run: cd java && mvn -B -q package
