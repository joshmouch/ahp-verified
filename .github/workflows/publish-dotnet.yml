name: Publish .NET (NuGet)
# MANUAL trigger by design. Publishing needs a credential this repo does not hold:
#   1. Create a NuGet API key scoped to `Ahp.Core.Verified` at nuget.org -> API Keys
#   2. Repo Settings -> Environments -> new environment `nuget-org` -> secret NUGET_API_KEY
#   3. Actions -> "Publish .NET (NuGet)" -> Run workflow
# Until then this stays unrun rather than failing on every tag.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to push to nuget.org'
        required: true
        default: 'dry-run'
permissions: { contents: read }
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: nuget-org
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - name: Build (warnings are errors)
        run: dotnet build cs/src/Ahp.Core.Verified/Ahp.Core.Verified.csproj -c Release -warnaserror
      - name: Smoke test the extracted reducers
        run: dotnet run --project cs/test/Ahp.Core.Verified.SmokeTest -c Release
      - name: Pack
        run: dotnet pack cs/src/Ahp.Core.Verified/Ahp.Core.Verified.csproj -c Release -o out
      - name: Push to nuget.org
        if: ${{ inputs.confirm == 'publish' }}
        run: dotnet nuget push "out/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
