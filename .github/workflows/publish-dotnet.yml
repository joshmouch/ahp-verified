name: Publish .NET (NuGet)
# Requires: environment `nuget-org` with secret NUGET_API_KEY.
# Release: bump cs VERSION, then `git tag dotnet/v0.1.0 && git push origin dotnet/v0.1.0`
on:
  push: { tags: ['dotnet/v[0-9]+.[0-9]+.[0-9]+'] }
permissions: { contents: read }
env:
  HAVE_KEY: ${{ secrets.NUGET_API_KEY != '' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: nuget-org
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - run: dotnet build cs/src/Ahp.Core.Verified/Ahp.Core.Verified.csproj -c Release -warnaserror
      - run: dotnet run --project cs/test/Ahp.Core.Verified.SmokeTest -c Release
      - run: dotnet pack cs/src/Ahp.Core.Verified/Ahp.Core.Verified.csproj -c Release -o out
      - name: publish (skipped when the registry secret is unset)
        run: dotnet nuget push "out/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
