name: Publish npm
# Requires: secret NPM_TOKEN (automation token) + the @open-agency scope.
on:
  push: { tags: ['js/v[0-9]+.[0-9]+.[0-9]+'] }
permissions: { contents: read, id-token: write }
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', registry-url: 'https://registry.npmjs.org' }
      - run: cd js && npm install --ignore-scripts && npm run build && npm test
      - run: cd js && npm publish --access public --provenance
        env: { NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}' }
