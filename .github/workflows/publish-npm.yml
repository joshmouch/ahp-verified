name: Publish npm
# MANUAL trigger. Needs secret NPM_TOKEN and the @open-agency scope.
# CI never rebuilds dist/ahp.cjs — regenerating requires Dafny plus a private runtime
# dependency. The committed bundle is the product and is what ships.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to push to npm'
        required: true
        default: 'dry-run'
permissions: { contents: read, id-token: write }
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', registry-url: 'https://registry.npmjs.org' }
      - run: cd js && npm install --ignore-scripts
      - name: Test the committed bundle
        run: cd js && npm test
      - name: Publish
        if: ${{ inputs.confirm == 'publish' }}
        run: cd js && npm publish --access public --provenance
        env: { NODE_AUTH_TOKEN: '${{ secrets.NPM_TOKEN }}' }
